<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Someone Special ❤️</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
overflow:hidden;
}

/* login */

.login{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#1e1e2f;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
width:85%;
max-width:350px;
}

input{
padding:12px;
border-radius:10px;
border:none;
font-size:16px;
width:90%;
margin-top:10px;
}

button{
padding:12px 20px;
margin-top:15px;
border:none;
background:#ff4d6d;
color:white;
font-size:16px;
border-radius:20px;
cursor:pointer;
}

/* main */

.container{
display:none;
text-align:center;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:600px;
}

/* hearts */

.heart{
position:fixed;
top:-10px;
color:#ff4d6d;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(100vh);
}
}

h1{
font-size:36px;
}

p{
font-size:18px;
line-height:1.7;
}

</style>
</head>

<body>

<div class="login" id="loginBox">

<h2>Enter Secret Password ❤️</h2>

<input type="password" id="password" placeholder="Password">

<br>

<button onclick="checkPassword()">Enter</button>

</div>


<div class="container" id="mainPage">

<h1>I'm Really Sorry ❤️</h1>

<p>

My love,

I know I made a mistake and hurt you.  
That was never my intention.

You mean everything to me and I hate seeing you sad.

Every moment without you feels incomplete.

Please forgive me.  
I promise I will always try to make you happy.

I love you ❤️

</p>

</div>


<audio autoplay loop>
<source src="https://www2.cs.uic.edu/~i101/SoundFiles/CanonInD.mp3" type="audio/mp3">
</audio>


<script>

function checkPassword(){

var pass=document.getElementById("password").value;

if(pass=="forever"){

document.getElementById("loginBox").style.display="none";
document.getElementById("mainPage").style.display="block";

startHearts();

}else{

alert("Wrong Password 😢");

}

}

function startHearts(){

setInterval(function(){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*20+20)+"px";

heart.style.animationDuration=(Math.random()*3+3)+"s";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},5000);

},300);

}

</script>

</body>
</html>
